name: Deploy Cart Manager Agent

on:
  push:
    paths:
      - 'src/prompts/CartManagerPrompt.txt'
      - 'src/infra/agents/cart-manager.json'
      - '.github/workflows/cart_manager_agent_deployment.yml'
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  deploy-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login via Azure CLI
        uses: azure/login@v2.1.1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy cart-manager agent to Foundry
        env:
          FOUNDRY_ENDPOINT: ${{ secrets.FOUNDRY_ENDPOINT }}
          GPT_DEPLOYMENT: ${{ secrets.GPT_DEPLOYMENT }}
        run: |
          # Fail early if required secrets/env are missing
          if [ -z "$FOUNDRY_ENDPOINT" ]; then
            echo "::error::FOUNDRY_ENDPOINT is not set. Set the secret FOUNDRY_ENDPOINT."
            exit 1
          fi
          if [ -z "$GPT_DEPLOYMENT" ]; then
            echo "::error::GPT_DEPLOYMENT is not set. Set the secret GPT_DEPLOYMENT to your model/deployment name."
            exit 1
          fi

          # Read the prompt file as raw text
          INSTRUCTIONS=$(python3 -c "
          import sys
          with open('src/prompts/CartManagerPrompt.txt', 'r', encoding='utf-8') as f:
              print(f.read())
          ")

          # Build the request body, using --arg (not --argjson) for string values
          jq --arg model "$GPT_DEPLOYMENT" \
             --arg instructions "$INSTRUCTIONS" \
             '.definition.model = $model | .definition.instructions = $instructions' \
             src/infra/agents/cart-manager.json > /tmp/agent-payload.json

          # Validate payload before calling API
          if ! jq -e '.definition.model | strings | length > 0' /tmp/agent-payload.json >/dev/null; then
            echo "::error::Payload missing model or model empty."
            jq '.' /tmp/agent-payload.json || true
            exit 1
          fi

          echo "Generated payload preview:"
          jq '.' /tmp/agent-payload.json

          # Create/update the agent version via Foundry REST API
          az rest --method POST \
            --url "${FOUNDRY_ENDPOINT}/agents/cart-manager/versions?api-version=2025-11-15-preview" \
            --headers "Content-Type=application/json" \
            --resource "https://ai.azure.com" \
            --body @/tmp/agent-payload.json

          echo "Cart manager agent deployed successfully."
